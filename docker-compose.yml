services:
  css:
    build:
      context: ./css
      dockerfile: Dockerfile
    image: cogitarelink-solid-css:latest
    ports:
      - "3000:3000"
    networks:
      default:
        aliases:
          - pod.vardeman.me
    volumes:
      - css-data:/data
      - ./css/config:/config:ro
    command:
      - -c
      - /config/solid-config.json
      - -f
      - /data
      - -b
      - http://pod.vardeman.me:3000
      - --seedConfig
      - /config/seed.json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--header", "Host: pod.vardeman.me:3000", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  pod-setup:
    image: python:3.12-slim
    volumes:
      - ./scripts:/scripts:ro
      - ./shapes:/shapes:ro
      - ./ontology:/ontology:ro
    working_dir: /scripts
    entrypoint: ["sh", "-c"]
    command:
      - |
        pip install --quiet httpx rdflib pyyaml &&
        python pod_setup.py --target http://pod.vardeman.me:3000
    depends_on:
      css:
        condition: service_healthy
    restart: "no"

  comunica:
    image: node:20-slim
    ports:
      - "8080:8080"
    entrypoint: ["sh", "-c"]
    command:
      - |
        npm install -g @comunica/query-sparql-link-traversal 2>/dev/null &&
        comunica-sparql-link-traversal-http http://pod.vardeman.me:3000/ -p 8080 --lenient
    depends_on:
      css:
        condition: service_healthy

volumes:
  css-data:
