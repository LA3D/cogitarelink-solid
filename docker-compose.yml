services:
  css:
    build:
      context: ./css
      dockerfile: Dockerfile
    image: cogitarelink-solid-css:latest
    ports:
      - "3000:3000"
    volumes:
      - css-data:/data
      - ./css/config:/config:ro
    command: ["-c", "/config/solid-config.json", "-f", "/data", "-b", "http://localhost:3000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  comunica:
    image: node:20-slim
    ports:
      - "8080:8080"
    entrypoint: ["npx", "--yes", "@comunica/query-sparql-link-traversal-solid"]
    command: ["http://css:3000/", "-p", "8080", "--lenient"]
    depends_on:
      css:
        condition: service_healthy

volumes:
  css-data:
